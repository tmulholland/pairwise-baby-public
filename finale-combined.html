<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finale Combined Ranking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Finale mode</p>
        <h1>Combined finale view</h1>
        <p class="hero-copy">
          Average the full-name combination ratings across the people you include here.
        </p>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="section-label">Filter users</p>
            <h2>Include these people in the combined ranking</h2>
          </div>
          <span id="combined-selection-summary" class="pill">Loading</span>
        </div>
        <div id="user-filter-tabs" class="tab-row"></div>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="section-label">Combined finale</p>
            <h2>Average rating across the selected users</h2>
          </div>
          <span id="combined-status" class="pill">Loading</span>
        </div>
        <div class="action-row subdued-action-row">
          <a id="back-to-comparing-link" class="ghost-button nav-link subtle-link" href="/finale">Back to finale</a>
          <a class="ghost-button nav-link subtle-link" href="/finale/results">Finale results</a>
        </div>
        <p id="combined-meta" class="muted meta-row"></p>
        <ol id="combined-ranking-list" class="ranking-list"></ol>
      </section>
    </main>

    <script src="/static/finale-combined.js"></script>
  </body>
</html>
