<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Finale Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Finale mode</p>
        <h1>Finale rankings</h1>
        <p class="hero-copy">
          Full-name combination rankings across finale users.
        </p>
      </section>

      <section class="panel">
        <div class="panel-header">
          <div>
            <p class="section-label">Results</p>
            <h2>Rankings across finale users</h2>
          </div>
          <span id="results-status" class="pill">Loading</span>
        </div>
        <div class="action-row subdued-action-row">
          <a id="back-to-comparing-link" class="ghost-button nav-link subtle-link" href="/finale">Back to finale</a>
          <a class="ghost-button nav-link subtle-link" href="/finale/combined">Finale combined</a>
        </div>
        <div id="ranking-columns" class="ranking-columns multi-user"></div>
      </section>

      <template id="ranking-card-template">
        <article class="ranking-card">
          <p class="section-label ranking-person"></p>
          <div class="panel-header compact">
            <h3 class="ranking-title"></h3>
            <span class="pill ranking-summary"></span>
          </div>
          <ol class="ranking-list"></ol>
        </article>
      </template>
    </main>

    <script src="/static/finale-results.js"></script>
  </body>
</html>
