<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Baby Name Pairwise Results</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="app-shell">
      <section class="hero">
        <p class="eyebrow">Results</p>
        <h1>Rankings across users.</h1>
        <p class="hero-copy">
          This page is separate from the comparison flow so people can opt in to seeing standings.
        </p>
      </section>

      <section class="panel controls-panel compact-panel">
        <div class="action-row">
          <a class="ghost-button nav-link" href="/troy">Back to comparing</a>
        </div>
      </section>

      <section class="panel rankings-panel">
        <div class="panel-header">
          <div>
            <p class="section-label">Results</p>
            <h2>Rankings across users</h2>
          </div>
          <span id="results-status" class="pill">Loading</span>
        </div>
        <div id="ranking-columns" class="ranking-columns multi-user"></div>
      </section>
    </main>

    <template id="ranking-card-template">
      <article class="ranking-card">
        <div class="panel-header compact">
          <div>
            <p class="section-label ranking-person"></p>
            <h3 class="ranking-title">Top names</h3>
          </div>
          <span class="pill ranking-summary"></span>
        </div>
        <ol class="ranking-list"></ol>
      </article>
    </template>

    <script src="/static/results.js"></script>
  </body>
</html>
