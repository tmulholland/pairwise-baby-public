<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Start Showtime Ranking</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,600;9..144,700&family=Manrope:wght@400;500;700&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/styles.css" />
  </head>
  <body>
    <main class="start-shell">
      <section class="start-panel">
        <p class="eyebrow">Final shortlist mode</p>
        <h1>Who is choosing?</h1>
        <p class="hero-copy">
          This opens the separate delivery-room shortlist, not the public family ranking.
        </p>
        <form id="start-form" class="start-form">
          <label class="field">
            <span>Your name</span>
            <input id="start-name" name="name" type="text" maxlength="40" autocomplete="name" autofocus />
          </label>
          <button class="solid-button" type="submit">Open shortlist</button>
          <p id="start-error" class="form-error hidden" role="alert"></p>
        </form>
      </section>
    </main>

    <script src="/static/showtime-start.js"></script>
  </body>
</html>
